  <!-- Color palette circles -->
  <circle cx="260" cy="380" r="20" fill="#a78bfa" opacity="0.6"/>
  <circle cx="310" cy="380" r="20" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="360" cy="380" r="20" fill="#7c3aed" opacity="0.5"/>
  <circle cx="410" cy="380" r="20" fill="#ddd6fe" opacity="0.7"/>
