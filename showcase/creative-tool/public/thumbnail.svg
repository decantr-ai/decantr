  <!-- Layers suggestion -->
  <rect x="200" y="430" width="600" height="60" rx="8" fill="#f5f0ff" stroke="#a78bfa" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="220" y="448" width="120" height="8" rx="3" fill="#a78bfa" opacity="0.25"/>
  <rect x="220" y="466" width="80" height="6" rx="3" fill="#1a1a2e" opacity="0.08"/>
  <rect x="400" y="448" width="120" height="8" rx="3" fill="#a78bfa" opacity="0.2"/>
  <rect x="400" y="466" width="80" height="6" rx="3" fill="#1a1a2e" opacity="0.08"/>
  <rect x="580" y="448" width="120" height="8" rx="3" fill="#a78bfa" opacity="0.15"/>
  <rect x="580" y="466" width="80" height="6" rx="3" fill="#1a1a2e" opacity="0.08"/>

