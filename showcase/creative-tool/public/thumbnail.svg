  <rect x="920" y="214" width="220" height="28" rx="6" fill="#ffffff" stroke="#a78bfa" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="920" y="260" width="80" height="8" rx="3" fill="#1a1a2e" opacity="0.12"/>
  <rect x="920" y="284" width="220" height="28" rx="6" fill="#ffffff" stroke="#a78bfa" stroke-opacity="0.15" stroke-width="1"/>
