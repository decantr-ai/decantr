  <!-- Left tools panel -->
  <rect x="40" y="40" width="60" height="550" rx="12" fill="#f0e7ff" stroke="#a78bfa" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="52" y="65" width="36" height="36" rx="8" fill="#a78bfa" opacity="0.2"/>
  <rect x="52" y="115" width="36" height="36" rx="8" fill="#a78bfa" opacity="0.15"/>
  <rect x="52" y="165" width="36" height="36" rx="8" fill="#a78bfa" opacity="0.15"/>
  <rect x="52" y="215" width="36" height="36" rx="8" fill="#a78bfa" opacity="0.15"/>
  <rect x="52" y="265" width="36" height="36" rx="8" fill="#a78bfa" opacity="0.15"/>
  <rect x="52" y="315" width="36" height="36" rx="8" fill="#a78bfa" opacity="0.1"/>
  <rect x="52" y="365" width="36" height="36" rx="8" fill="#a78bfa" opacity="0.1"/>

  <!-- Canvas area -->
