  <circle cx="1020" cy="360" r="8" fill="#a78bfa" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="554" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#a78bfa">Creative Tool</text>
  <!-- Subtitle -->
  <text x="600" y="586" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#1a1a2e" opacity="0.35">Decantr Showcase</text>
</svg>