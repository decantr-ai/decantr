name: Publish
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: Publish packages with OIDC provenance
        run: |
          for pkg in essence-spec registry core mcp-server cli; do
            echo "--- Publishing @decantr/$pkg ---"
            cd packages/$pkg
            npm publish --access public --provenance --tag beta 2>&1 || echo "Failed or already published: $pkg"
            cd $GITHUB_WORKSPACE
          done
