name: Publish
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_wave:
        description: Release wave to publish
        required: false
        type: choice
        options:
          - all
          - foundation
          - delivery
          - experimental
        default: all
      dist_tag:
        description: Optional dist-tag override for all selected packages
        required: false
        default: ''
      include_experimental:
        description: Include experimental packages such as @decantr/vite-plugin
        required: false
        type: boolean
        default: false
      dry_run_only:
        description: Generate the release plan and run publish selection as a dry run only
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm audit:package-surface
      - run: pnpm audit:release-readiness
      - name: Generate release plan summary
        env:
          RELEASE_WAVE: ${{ github.event.inputs.release_wave || 'all' }}
        run: |
          ARGS=""
          if [ "$RELEASE_WAVE" != "all" ]; then
            ARGS="$ARGS --wave=$RELEASE_WAVE"
          fi
          node scripts/release-plan.mjs $ARGS --summary-markdown=/tmp/package-release-plan.md
          cat /tmp/package-release-plan.md >> "$GITHUB_STEP_SUMMARY"
      - name: Publish packages with OIDC provenance
        env:
          RELEASE_WAVE: ${{ github.event.inputs.release_wave || 'all' }}
          DIST_TAG_OVERRIDE: ${{ github.event.inputs.dist_tag || '' }}
          INCLUDE_EXPERIMENTAL: ${{ github.event.inputs.include_experimental || 'false' }}
          DRY_RUN_ONLY: ${{ github.event.inputs.dry_run_only || 'false' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ARGS=""
          if [ "$RELEASE_WAVE" != "all" ]; then
            ARGS="$ARGS --wave=$RELEASE_WAVE"
          fi
          if [ -n "$DIST_TAG_OVERRIDE" ]; then
            ARGS="$ARGS --tag-override=$DIST_TAG_OVERRIDE"
          fi
          if [ "$INCLUDE_EXPERIMENTAL" = "true" ]; then
            ARGS="$ARGS --include-experimental"
          fi
          if [ "$DRY_RUN_ONLY" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/publish-packages.mjs $ARGS
