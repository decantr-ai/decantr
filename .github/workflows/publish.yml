name: Publish
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dist_tag:
        description: Optional dist-tag override for all selected packages
        required: false
        default: ''
      include_experimental:
        description: Include experimental packages such as @decantr/vite-plugin
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm audit:package-surface
      - name: Publish packages with OIDC provenance
        env:
          DIST_TAG_OVERRIDE: ${{ github.event.inputs.dist_tag || '' }}
          INCLUDE_EXPERIMENTAL: ${{ github.event.inputs.include_experimental || 'false' }}
        run: |
          ARGS=""
          if [ -n "$DIST_TAG_OVERRIDE" ]; then
            ARGS="$ARGS --tag-override=$DIST_TAG_OVERRIDE"
          fi
          if [ "$INCLUDE_EXPERIMENTAL" = "true" ]; then
            ARGS="$ARGS --include-experimental"
          fi
          node scripts/publish-packages.mjs $ARGS
