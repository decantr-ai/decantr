name: Deploy API to Fly

on:
  workflow_dispatch:
    inputs:
      run_public_audit:
        description: "Run hosted public API audit after deploy"
        required: true
        default: true
        type: boolean

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate Fly deploy secret
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing GitHub Actions secret: FLY_API_TOKEN"; exit 1; }

      - name: Deploy apps/api to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/api/fly.toml --remote-only

      - uses: pnpm/action-setup@v4
        if: ${{ inputs.run_public_audit }}
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: ${{ inputs.run_public_audit }}
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.run_public_audit }}

      - name: Audit hosted public API after deploy
        if: ${{ inputs.run_public_audit }}
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL || 'https://api.decantr.ai/v1' }}
          CONTENT_NAMESPACE: ${{ vars.CONTENT_NAMESPACE || '@official' }}
        run: node scripts/audit-public-api.mjs --include-hosted-pack-select --include-hosted-critique --include-hosted-project-audit --fail-on-error --report-json=public-api-report.json --summary-markdown=public-api-summary.md

      - name: Publish post-deploy audit summary
        if: ${{ inputs.run_public_audit }}
        run: cat public-api-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload post-deploy audit artifacts
        if: ${{ inputs.run_public_audit }}
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-public-api-audit
          path: |
            public-api-report.json
            public-api-summary.md
          if-no-files-found: error
