name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm run showcase:validate
        if: matrix.node-version == 20
      - run: pnpm run showcase:verify:shortlist
        if: matrix.node-version == 20
      - run: SHOWCASE_GOLDEN_ONLY=1 node scripts/copy-showcase-dist.mjs --dry-run
        if: matrix.node-version == 20
      - uses: actions/upload-artifact@v4
        if: matrix.node-version == 20
        with:
          name: showcase-shortlist-verification
          path: apps/showcase/reports/shortlist-verification.json
