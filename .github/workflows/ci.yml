name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx decantr test

      - name: Validate essence
        run: npx decantr validate
        working-directory: workbench

      - name: Lint
        run: npx decantr lint
        working-directory: workbench

      - name: Build
        run: npx decantr build
        working-directory: workbench

      - name: Type check
        run: node tools/dts-gen.js --check
