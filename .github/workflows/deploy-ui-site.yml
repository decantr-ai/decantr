name: Deploy UI Site to GitHub Pages

on:
  # Disabled: this workflow deploys to the same GitHub Pages environment as
  # the docs homepage (pages.yml), overwriting decantr.ai with the ui-site build.
  # Re-enable when ui-site has its own deployment target (e.g. ui.decantr.ai).
  #
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/ui-site/**'
  #     - 'packages/ui-catalog/**'
  #     - 'packages/ui/**'
  #     - 'packages/ui-chart/**'
  #     - 'packages/css/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @decantr/ui-site build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/ui-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
