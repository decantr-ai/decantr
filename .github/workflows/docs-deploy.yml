name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/registry/**'
      - 'showcase/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Sync showcase manifest into docs
        run: mkdir -p docs/src/data && echo "export const showcaseManifest = $(cat showcase/showcase.manifest.json);" > docs/src/data/showcases.js

      - name: Build docs site
        run: npx decantr build
        working-directory: docs

      - name: Build showcases
        run: |
          for dir in showcase/*/; do
            id=$(basename "$dir")
            echo "::group::Building showcase: $id"
            (cd "$dir" && npm install && npx decantr build)
            mkdir -p docs/dist/showcase/$id
            cp -r "$dir/dist/"* docs/dist/showcase/$id/
            echo "::endgroup::"
          done
          mkdir -p docs/dist/showcase/shared
          cp showcase/showcase.manifest.json docs/dist/showcase/manifest.json
          cp showcase/shared/showcase-nav.js docs/dist/showcase/shared/showcase-nav.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
