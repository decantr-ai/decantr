name: Deploy Registry Portal

on:
  workflow_dispatch:
    inputs:
      run_portal_audit:
        description: Run the hosted portal audit after deploy
        required: false
        type: boolean
        default: true

jobs:
  deploy-registry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      REGISTRY_PORTAL_URL: ${{ vars.REGISTRY_PORTAL_URL || 'https://registry.decantr.ai' }}
      REGISTRY_PORTAL_EXPECTED_BLUEPRINT: ${{ vars.REGISTRY_PORTAL_EXPECTED_BLUEPRINT || 'ai-copilot-shell' }}
      REGISTRY_PORTAL_EXPECTED_NAMESPACE: ${{ vars.REGISTRY_PORTAL_EXPECTED_NAMESPACE || '@official' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit:registry-authenticated
      - name: Validate Vercel deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "Missing GitHub Actions secret: VERCEL_TOKEN"; exit 1; }
          test -n "$VERCEL_ORG_ID" || { echo "Missing GitHub Actions secret: VERCEL_ORG_ID"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Missing GitHub Actions secret: VERCEL_PROJECT_ID"; exit 1; }
      - name: Pull Vercel production config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd apps/registry
      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm dlx vercel env pull .env.production.local --yes --environment=production --token="$VERCEL_TOKEN" --cwd apps/registry
      - run: pnpm --filter './apps/registry' build
      - name: Deploy registry portal to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm dlx vercel deploy --prod --yes --token="$VERCEL_TOKEN"
      - name: Audit hosted registry portal after deploy
        if: ${{ inputs.run_portal_audit }}
        run: node scripts/audit-registry-portal.mjs --fail-on-error --report-json=registry-portal-report.json --summary-markdown=registry-portal-summary.md
      - name: Publish post-deploy audit summary
        if: ${{ inputs.run_portal_audit }}
        run: cat registry-portal-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload post-deploy audit artifacts
        if: ${{ inputs.run_portal_audit }}
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-registry-portal-audit
          path: |
            registry-portal-report.json
            registry-portal-summary.md
          if-no-files-found: error
