<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Decantr Component Workbench — development environment for previewing and testing all framework components across styles and modes.">
  <title>decantr workbench</title>
  <style>
    @layer d.base, d.theme, d.atoms, d.user;

    *, *::before, *::after { margin: 0; box-sizing: border-box; }

    html { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

    body { min-height: 100vh; overflow: hidden; }

    @layer d.base {
      :focus-visible { outline: 2px solid var(--d-primary); outline-offset: 2px; border-radius: var(--d-radius); }
    }

    /* Workbench shell styles — not part of the framework, just the dev tool */
    @layer d.user {
      .wb-shell { display: flex; flex-direction: column; height: 100vh; }
      .wb-header { display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; height: 48px; min-height: 48px; border-bottom: 1px solid var(--d-border); background: var(--d-surface-0); z-index: 10; }
      .wb-body { display: flex; flex: 1; overflow: hidden; }
      .wb-sidebar { display: flex; flex-direction: column; width: 240px; min-width: 240px; height: 100%; overflow-y: auto; border-right: 1px solid var(--d-border); background: var(--d-surface-0); transition: width 0.15s ease, min-width 0.15s ease; }
      .wb-sidebar.wb-compact { width: 48px; min-width: 48px; }
      .wb-sidebar::-webkit-scrollbar { width: 4px; }
      .wb-sidebar::-webkit-scrollbar-thumb { background: var(--d-border); border-radius: 2px; }
      .wb-main { flex: 1; overflow-y: auto; background: var(--d-bg); }
      .wb-content { max-width: 1120px; width: 100%; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
      .wb-viewport-frame { margin: 0 auto; border: 1px dashed var(--d-border-strong); border-radius: var(--d-radius); overflow: auto; background: var(--d-bg); position: relative; }
      .wb-viewport-label { position: absolute; top: -1.5rem; left: 50%; transform: translateX(-50%); font-size: 0.6875rem; color: var(--d-muted); white-space: nowrap; }
      .wb-search-modal { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: flex-start; justify-content: center; padding-top: 20vh; background: var(--d-overlay); }
      .wb-search-box { width: 480px; max-width: 90vw; background: var(--d-surface-1); border: 1px solid var(--d-border); border-radius: var(--d-radius); box-shadow: var(--d-elevation-3); overflow: hidden; }
      .wb-search-input { width: 100%; padding: 0.75rem 1rem; border: none; border-bottom: 1px solid var(--d-border); background: transparent; color: var(--d-fg); font-size: 0.875rem; font-family: inherit; outline: none; }
      .wb-search-input::placeholder { color: var(--d-muted); }
      .wb-search-results { max-height: 320px; overflow-y: auto; padding: 0.25rem; }
      .wb-search-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; border-radius: var(--d-radius); cursor: pointer; font-size: 0.8125rem; color: var(--d-fg); }
      .wb-search-item:hover, .wb-search-item.wb-active { background: var(--d-primary-subtle); color: var(--d-primary); }
      .wb-search-item-cat { font-size: 0.6875rem; color: var(--d-muted); margin-left: auto; }
      .wb-search-empty { padding: 1.5rem; text-align: center; color: var(--d-muted); font-size: 0.8125rem; }
      .wb-nav-group { margin-bottom: 0.25rem; }
      .wb-nav-header { display: flex; align-items: center; justify-content: space-between; padding: 0.375rem 0.75rem; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--d-muted); font-family: inherit; }
      .wb-nav-header:hover { color: var(--d-fg); }
      .wb-nav-header .wb-count { font-size: 0.625rem; font-weight: 500; color: var(--d-muted); background: var(--d-surface-1); padding: 0 0.375rem; border-radius: 9999px; line-height: 1.5; }
      .wb-nav-items { display: flex; flex-direction: column; }
      .wb-nav-items.wb-collapsed { display: none; }
      .wb-nav-item { display: flex; align-items: center; padding: 0.25rem 0.75rem 0.25rem 1.25rem; border: none; background: none; cursor: pointer; font-size: 0.75rem; color: var(--d-muted-fg); text-align: left; width: 100%; font-family: inherit; border-radius: 0; }
      .wb-nav-item:hover { background: var(--d-primary-subtle); color: var(--d-primary); }
      .wb-nav-item.wb-active { color: var(--d-primary); font-weight: 500; background: var(--d-primary-subtle); }
      .wb-sidebar-search { padding: 0.5rem; border-bottom: 1px solid var(--d-border); }
      .wb-sidebar-search input { width: 100%; padding: 0.375rem 0.5rem; border: 1px solid var(--d-border); border-radius: var(--d-radius); background: var(--d-surface-1); color: var(--d-fg); font-size: 0.75rem; font-family: inherit; outline: none; }
      .wb-sidebar-search input:focus { border-color: var(--d-primary); }
      .wb-sidebar-search input::placeholder { color: var(--d-muted); }
      .wb-breadcrumb { display: flex; align-items: center; gap: 0.375rem; font-size: 0.75rem; color: var(--d-muted); margin-bottom: 1rem; }
      .wb-breadcrumb a { color: var(--d-muted); text-decoration: none; cursor: pointer; }
      .wb-breadcrumb a:hover { color: var(--d-primary); }
      .wb-breadcrumb .wb-sep { color: var(--d-border-strong); }

      /* Token inspector */
      .wb-token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
      .wb-swatch { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-radius: var(--d-radius); border: 1px solid var(--d-border); background: var(--d-surface-0); }
      .wb-swatch-color { width: 2rem; height: 2rem; border-radius: var(--d-radius); border: 1px solid var(--d-border); flex-shrink: 0; }
      .wb-swatch-label { font-size: 0.6875rem; color: var(--d-fg); font-weight: 500; }
      .wb-swatch-value { font-size: 0.625rem; color: var(--d-muted); font-family: "JetBrains Mono", monospace; }
      .wb-type-sample { padding: 0.375rem 0; border-bottom: 1px solid var(--d-border); display: flex; align-items: baseline; gap: 1rem; }
      .wb-type-label { font-size: 0.625rem; color: var(--d-muted); font-family: "JetBrains Mono", monospace; min-width: 8rem; flex-shrink: 0; }
      .wb-spacing-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.25rem 0; }
      .wb-spacing-bar { height: 1rem; background: var(--d-primary-subtle); border: 1px solid var(--d-primary-border); border-radius: 2px; }
      .wb-spacing-label { font-size: 0.625rem; color: var(--d-muted); font-family: "JetBrains Mono", monospace; min-width: 5rem; }
      .wb-elevation-box { padding: 1.5rem; border-radius: var(--d-radius); background: var(--d-surface-0); text-align: center; font-size: 0.75rem; color: var(--d-muted); }
      .wb-motion-box { width: 3rem; height: 3rem; border-radius: var(--d-radius); background: var(--d-primary); cursor: pointer; }
      .wb-section-title { font-size: 1.125rem; font-weight: 600; color: var(--d-fg); margin-bottom: 0.75rem; }
      .wb-section-block { margin-bottom: 2rem; }
      .wb-surface-card { padding: 1rem; border-radius: var(--d-radius); text-align: center; font-size: 0.75rem; min-height: 5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; }

      /* Home page */
      .wb-home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; }
      .wb-home-card { padding: 1rem; border-radius: var(--d-radius); border: 1px solid var(--d-border); background: var(--d-surface-0); cursor: pointer; transition: border-color 0.15s; }
      .wb-home-card:hover { border-color: var(--d-primary); }
      .wb-home-card h3 { font-size: 0.875rem; font-weight: 600; color: var(--d-fg); margin-bottom: 0.25rem; }
      .wb-home-card p { font-size: 0.6875rem; color: var(--d-muted); }
      .wb-home-card .wb-count { font-size: 1.25rem; font-weight: 700; color: var(--d-primary); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
