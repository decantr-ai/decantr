name: Daily SQLite Backup

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Download SQLite database
        run: |
          flyctl ssh console -C "cp /data/registry.db /tmp/registry-backup.db" -a decantr-registry
          flyctl ssh sftp get /tmp/registry-backup.db ./registry-backup-$(date +%Y%m%d).db -a decantr-registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-backup-${{ github.run_id }}
          path: registry-backup-*.db
          retention-days: 30
