<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#060918"/>

  <!-- Decorative gradient circle -->
  <circle cx="900" cy="200" r="200" fill="#FE4474" opacity="0.06"/>
  <circle cx="300" cy="500" r="150" fill="#FE4474" opacity="0.04"/>

  <!-- Top nav -->
  <rect x="80" y="40" width="100" height="14" rx="4" fill="#FE4474" opacity="0.7"/>
  <rect x="880" y="42" width="50" height="10" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="960" y="42" width="50" height="10" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="1040" y="42" width="50" height="10" rx="3" fill="#ffffff" opacity="0.15"/>

  <!-- Hero section -->
  <rect x="80" y="100" width="500" height="24" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="80" y="140" width="380" height="14" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="80" y="168" width="440" height="14" rx="3" fill="#ffffff" opacity="0.1"/>
  <rect x="80" y="196" width="300" height="14" rx="3" fill="#ffffff" opacity="0.1"/>
  <!-- CTA button -->
  <rect x="80" y="234" width="140" height="36" rx="8" fill="#FE4474" opacity="0.85"/>
  <rect x="240" y="234" width="140" height="36" rx="8" fill="none" stroke="#FE4474" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Hero image placeholder -->
  <rect x="680" y="90" width="440" height="200" rx="16" fill="#0d1030" stroke="#FE4474" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="900" cy="190" r="40" fill="#FE4474" opacity="0.15"/>

  <!-- Project grid -->
  <rect x="80" y="330" width="330" height="200" rx="14" fill="#0d1030" stroke="#FE4474" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="96" y="346" width="298" height="120" rx="8" fill="#0f0f2e"/>
  <rect x="96" y="482" width="160" height="10" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="96" y="502" width="100" height="8" rx="3" fill="#FE4474" opacity="0.4"/>

  <rect x="435" y="330" width="330" height="200" rx="14" fill="#0d1030" stroke="#FE4474" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="451" y="346" width="298" height="120" rx="8" fill="#0f0f2e"/>
  <rect x="451" y="482" width="160" height="10" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="451" y="502" width="100" height="8" rx="3" fill="#FE4474" opacity="0.4"/>

  <rect x="790" y="330" width="330" height="200" rx="14" fill="#0d1030" stroke="#FE4474" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="806" y="346" width="298" height="120" rx="8" fill="#0f0f2e"/>
  <rect x="806" y="482" width="160" height="10" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="806" y="502" width="100" height="8" rx="3" fill="#FE4474" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="576" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FE4474">Portfolio</text>
  <!-- Subtitle -->
  <text x="600" y="612" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#ffffff" opacity="0.35">Decantr Showcase</text>
