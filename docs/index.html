  <style>
    @layer d.base, d.theme, d.atoms, d.user;

    *, *::before, *::after { margin: 0; box-sizing: border-box; }

    html {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: #060918;
      color: #fafafa;
    }

    @layer d.base {
      :focus-visible { outline: 2px solid #6500C6; outline-offset: 2px; border-radius: 8px; }
    }

    /* Prevent FOUC — hide until JS loads */
    #app { opacity: 0; transition: opacity 0.3s ease; }
    #app.ds-ready { opacity: 1; }
  </style>
